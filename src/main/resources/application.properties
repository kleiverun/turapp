spring.datasource.url=jdbc:mysql://localhost:3306/turapp
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# GPX uploads can be a few MB (many routes with thousands of points).
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB

# JWT — change the secret to a random 32+ char string before deploying
app.jwt.secret=changeme-replace-with-a-random-secret-key-min-32chars
app.jwt.expiration-days=30